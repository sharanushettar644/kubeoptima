name: Build & Test All Services
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Dashboard
  # ─────────────────────────────────────────────
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/dashboard

      - name: Lint
        run: npm run lint
        working-directory: apps/dashboard

      - name: Type check
        run: npm run type-check
        working-directory: apps/dashboard

      - name: Build
        run: npm run build
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_API_URL: https://api.kubeoptima.io

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/dashboard
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Go Services
  # ─────────────────────────────────────────────
  build-go-services:
    name: Build Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, k8s-operator, scheduler-plugin, optimizer]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: apps/${{ matrix.service }}/go.sum

      - name: Vet
        run: go vet ./...
        working-directory: apps/${{ matrix.service }}

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        working-directory: apps/${{ matrix.service }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/${{ matrix.service }}/coverage.txt
          flags: ${{ matrix.service }}

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-w -s -X main.version=${{ github.sha }}" \
          -o bin/${{ matrix.service }} ./cmd/...
        working-directory: apps/${{ matrix.service }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Python AI Service
  # ─────────────────────────────────────────────
  build-ai-service:
    name: Build AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
        working-directory: apps/ai-service

      - name: Lint (ruff)
        run: pip install ruff && ruff check .
        working-directory: apps/ai-service

      - name: Type check (mypy)
        run: pip install mypy && mypy app/ --ignore-missing-imports
        working-directory: apps/ai-service

      - name: Tests
        run: pytest tests/ -v --tb=short
        working-directory: apps/ai-service

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-dashboard, build-go-services, build-ai-service]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/python
            p/typescript
            p/kubernetes
            p/docker

  # ─────────────────────────────────────────────
  # Helm Lint
  # ─────────────────────────────────────────────
  helm-lint:
    name: Helm Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.2"

      - name: Helm lint
        run: helm lint infrastructure/helm/kubeoptima/

      - name: Helm template (validate)
        run: helm template kubeoptima infrastructure/helm/kubeoptima/ --debug > /dev/null

      - name: Kubeval
        uses: instrumenta/kubeval-action@master
        with:
          files: infrastructure/k8s/

  # ─────────────────────────────────────────────
  # Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [security-scan, helm-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name kubeoptima-staging --region us-east-1

      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install kubeoptima infrastructure/helm/kubeoptima/ \
            --namespace kubeoptima-system \
            --create-namespace \
            --set global.image.tag=${{ github.sha }} \
            -f infrastructure/helm/kubeoptima/values-staging.yaml \
            --atomic \
            --timeout 10m \
            --wait
